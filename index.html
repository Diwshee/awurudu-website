<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awurudu 2026 | Digital Celebration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #e64a19;
    --secondary: #ffa000;
    --accent: #ffd54f;
    --bg: #fffbf2;
    --text: #2d3436;
    --white: #ffffff;
}

/* Reset & Body */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height:1.6; overflow-x:hidden; }

/* Fireworks Canvas */
#fireworks { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.7; }

/* Header */
header {
    position: relative; z-index:10; padding:100px 20px 60px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color:white; text-align:center;
    clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
header h1 { font-size: clamp(2.5rem,8vw,4rem); font-weight:800; margin-bottom:10px; }
header p { font-size:1.2rem; opacity:0.9; }

/* Navigation */
nav { position: relative; z-index:20; text-align:center; margin-top:-30px; }
.lang-btn {
    background: var(--white); border:none; padding:12px 24px; margin:5px; border-radius:50px;
    font-weight:700; color: var(--primary); cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}
.lang-btn:hover { transform: translateY(-3px); background: var(--accent); color: var(--text); }
.lang-btn.active { background: var(--primary); color:white; }

/* Main */
main { position: relative; z-index:10; max-width:900px; margin:40px auto; padding:0 20px; }
section { background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); border-radius:20px; padding:40px; margin-bottom:30px; box-shadow:0 10px 40px rgba(0,0,0,0.05); text-align:center; }
h2 { font-size:1.8rem; color: var(--primary); margin-bottom:25px; position:relative; display:inline-block; }
h2::after { content:''; position:absolute; bottom:-5px; left:20%; width:60%; height:3px; background: var(--accent); }

/* --- Main Wish --- */
#wish-section h2 {
    font-size:2rem; color:#ff6f00; text-shadow:0 0 10px #ffd54f, 0 0 20px #ffa000;
    animation: glow 2s ease-in-out infinite alternate; margin-bottom:30px;
}
@keyframes glow {
    from { text-shadow:0 0 10px #ffd54f, 0 0 20px #ffa000; }
    to { text-shadow:0 0 20px #ff6f00, 0 0 30px #ffab00; }
}

/* --- Family Diary Card --- */
.diary-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff8f0;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    transition: transform 0.3s ease;
}
.diary-card:hover { transform: translateY(-5px); }

.diary-photo {
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.diary-text h2 {
    font-size: 1.6rem;
    color: #ff4081;
    text-align: center;
    text-shadow: 0 0 10px #ff80ab,0 0 20px #ff4081;
    animation: glow-family 2s ease-in-out infinite alternate;
}

@keyframes glow-family {
    from { text-shadow:0 0 10px #ff80ab,0 0 20px #ff4081; }
    to { text-shadow:0 0 20px #f50057,0 0 30px #ff4081; }
}

/* Countdown Timer */
.timer-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px; }
.timer-box { background:#fff3e0; padding:20px 10px; border-radius:12px; border:1px solid var(--accent); }
.timer-val { display:block; font-size:2rem; font-weight:800; color: var(--primary); }
.timer-label { font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:#666; }

/* Nakath Table */
.table-wrapper { overflow-x:auto; }
table { width:100%; border-collapse:collapse; margin-top:20px; text-align:left; }
th { background:#fff3e0; padding:15px; font-weight:700; color: var(--primary); }
td { padding:15px; border-bottom:1px solid #eee; }
tr:last-child td { border-bottom:none; }
tr:hover { background:#fffdf9; }

footer { text-align:center; padding:40px; color:#888; font-size:0.9rem; }

@media(max-width:600px){
    .timer-grid { gap:8px; }
    .timer-val { font-size:1.2rem; }
    section { padding:20px; }
    #wish-section h2 { font-size:1.5rem; }
    .diary-text h2 { font-size:1.4rem; }
    .diary-photo { max-width: 90%; }
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<header>
    <h1 id="txt-title">Happy Awurudu 2026</h1>
    <p id="txt-subtitle">The Sinhala & Tamil New Year Celebration</p>
</header>

<nav>
    <button class="lang-btn active" onclick="setLang('en', this)">English</button>
    <button class="lang-btn" onclick="setLang('si', this)">සිංහල</button>
    <button class="lang-btn" onclick="setLang('ta', this)">தமிழ்</button>
</nav>

<main>
    <!-- Main Wish -->
    <section id="wish-section">
        <h2 id="txt-wish">🎉 Wishing You a Happy Awurudu! 🎉</h2>
    </section>

    <!-- Family Diary Card -->
    <section id="family-wish-section">
        <div class="diary-card">
            <img src="your-photo.jpg" alt="Family Photo" class="diary-photo">
            <div class="diary-text">
                <h2 id="txt-family-wish">🎉 Wishing my dear family a joyful Awurudu 2026! Love, Dishi 💛 🎉</h2>
            </div>
        </div>
    </section>

    <!-- Countdown -->
    <section>
        <h2 id="txt-cd-head">Countdown to Dawn</h2>
        <div class="timer-grid">
            <div class="timer-box"><span class="timer-val" id="days">00</span><span class="timer-label" id="lbl-d">Days</span></div>
            <div class="timer-box"><span class="timer-val" id="hours">00</span><span class="timer-label" id="lbl-h">Hours</span></div>
            <div class="timer-box"><span class="timer-val" id="mins">00</span><span class="timer-label" id="lbl-m">Mins</span></div>
            <div class="timer-box"><span class="timer-val" id="secs">00</span><span class="timer-label" id="lbl-s">Secs</span></div>
        </div>
    </section>

    <!-- Nakath Table -->
    <section>
        <h2 id="txt-nk-head">Auspicious Times</h2>
        <div class="table-wrapper">
            <table id="nakath-table"></table>
        </div>
    </section>
</main>

<footer>
    &copy; 2026 Awurudu Digital Portal | Traditional Vibes, Modern Code
</footer>

<script>
// --- Configuration ---
const config = {
    targetDate: new Date("April 14, 2026 00:00:00").getTime(),
    languages: {
        en:{ title:"Happy Awurudu 2026", sub:"The Sinhala & Tamil New Year Celebration", cdHead:"Countdown to Dawn", nkHead:"Auspicious Times (Nakath)", wish:"🎉 Wishing You a Happy Awurudu! 🎉", familyWish:"🎉 Wishing my dear family a joyful Awurudu 2026! Love, Dishi 💛 🎉", labels:["Days","Hours","Mins","Secs"], cols:["Ritual","Time"], data:[["New Year Dawn","06:14 AM"],["Neutral Period (Nonagathaya)","Starts 11:50 PM (13th)"],["Boiling Milk","07:02 AM"],["Starting Work & Meals","08:15 AM"]] },
        si:{ title:"සුභ අලුත් අවුරුද්දක් වේවා", sub:"සිංහල හා දෙමළ අලුත් අවුරුදු මංගල්‍යය", cdHead:"අලුත් අවුරුදු උදාවට තව", nkHead:"නැකත් වේලාවන්", wish:"🎊 ඔබට සුභ අලුත් අවුරුද්දක් වේවා! 🎊", familyWish:"🎊 මගේ ආදරණීය පවුලට සුභ අලුත් අවුරුද්දක් වේවා! ඔබේ, දිෂි 💛 🎊", labels:["දින","පැය","මිනිත්තු","තත්පර"], cols:["චාරිත්‍රය","වේලාව"], data:[["අලුත් අවුරුදු උදාව","පෙ.ව. 06:14"],["නොනගතය","පෙ.ව. 11:50 (13 වනදා) සිට"],["කිරි ඉතිරවීම","පෙ.ව. 07:02"],["වැඩ ඇල්ලීම සහ ආහාර අනුභවය","පෙ.ව. 08:15"]] },
        ta:{ title:"இனிய புத்தாண்டு வாழ்த்துக்கள்", sub:"சிங்கள மற்றும் தமிழ் புத்தாண்டு கொண்டாட்டம்", cdHead:"புத்தாண்டுக்கான கவுண்ட்டவுன்", nkHead:"சுப நேரங்கள்", wish:"🎉 இனிய புத்தாண்டு வாழ்த்துக்கள்! 🎉", familyWish:"🎉 எனது அன்பான குடும்பத்தினருக்கு இனிய புத்தாண்டு வாழ்த்துக்கள்! உங்கள், திஷி 💛 🎉", labels:["நாட்கள்","மணி","நிமிடம்","நொடி"], cols:["நிகழ்வு","நேரம்"], data:[["புத்தாண்டு பிறப்பு","காலை 06:14"],["புண்ணிய காலம்","முற்பகல் 11:50 (13ம் திகதி)"],["பால் காய்ச்சுதல்","காலை 07:02"],["கைவிசேடம் மற்றும் உணவு","காலை 08:15"]] }
    }
};

// --- Language Switch ---
function setLang(lang, btn){
    const l=config.languages[lang];
    document.getElementById('txt-title').textContent=l.title;
    document.getElementById('txt-subtitle').textContent=l.sub;
    document.getElementById('txt-cd-head').textContent=l.cdHead;
    document.getElementById('txt-nk-head').textContent=l.nkHead;
    document.getElementById('txt-wish').textContent=l.wish;
    document.getElementById('txt-family-wish').textContent=l.familyWish;
    document.getElementById('lbl-d').textContent=l.labels[0];
    document.getElementById('lbl-h').textContent=l.labels[1];
    document.getElementById('lbl-m').textContent=l.labels[2];
    document.getElementById('lbl-s').textContent=l.labels[3];

    let tableHTML=`<thead><tr><th>${l.cols[0]}</th><th>${l.cols[1]}</th></tr></thead><tbody>`;
    l.data.forEach(row=>{tableHTML+=`<tr><td>${row[0]}</td><td><strong>${row[1]}</strong></td></tr>`});
    document.getElementById('nakath-table').innerHTML=tableHTML+"</tbody>";

    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
}

// --- Countdown ---
function updateTimer(){
    const now=new Date().getTime();
    const gap=config.targetDate-now;
    if(gap<0){ document.querySelector('.timer-grid').innerHTML="<h3>🎉 Suba Aluth Avuruddak! 🎉</h3>"; return; }
    const d=Math.floor(gap/86400000);
    const h=Math.floor((gap%86400000)/3600000);
    const m=Math.floor((gap%3600000)/60000);
    const s=Math.floor((gap%60000)/1000);
    document.getElementById('days').textContent=d.toString().padStart(2,'0');
    document.getElementById('hours').textContent=h.toString().padStart(2,'0');
    document.getElementById('mins').textContent=m.toString().padStart(2,'0');
    document.getElementById('secs').textContent=s.toString().padStart(2,'0');
}

// --- Fireworks ---
const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');
let particles=[];
class Particle{constructor(x,y,color){this.x=x;this.y=y;this.color=color;this.v={x:(Math.random()-0.5)*5,y:(Math.random()-0.5)*5};this.alpha=1;}draw(){ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();}update(){this.x+=this.v.x;this.y+=this.v.y;this.alpha-=0.01;}}
function spawn(){const x=Math.random()*canvas.width;const y=Math.random()*(canvas.height/2);const color=`hsl(${Math.random()*360},80%,60%)`;for(let i=0;i<40;i++)particles.push(new Particle(x,y,color));}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach((p,i)=>{p.update();p.draw();if(p.alpha<=0)particles.splice(i,1);});requestAnimationFrame(animate);}
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
window.dispatchEvent(new Event('resize'));

// --- Initialize ---
setLang('en');
setInterval(updateTimer,1000);
setInterval(spawn,800);
animate();
</script>

</body>
</html>
